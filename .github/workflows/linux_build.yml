name: Build Linux (Debian)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    name: Build Linux .deb package
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.2'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libmpv-dev mpv \
            libayatana-appindicator3-dev \
            ninja-build libgtk-3-dev \
            liblzma-dev cmake \
            rpm patchelf

      - name: Create constant.dart
        run: |
          cat > lib/services/constant.dart << 'EOF'
          const String domain = "https://music.youtube.com/";
          const String baseUrl = '${domain}youtubei/v1/';
          const String fixedParms = '?prettyPrint=false&alt=json&key=${{ secrets.YTM_API_KEY }}';
          const String userAgent = 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/114.0.0.0 Safari/537.36';
          EOF

      - name: Install packages
        run: flutter pub get

      - name: Build Linux .deb
        run: |
          dart pub global activate flutter_distributor
          echo "const updateCheckFlag = true;" > lib/utils/update_check_flag_file.dart
          flutter_distributor package --platform linux --targets deb

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v5
        with:
          name: nexus-music-linux-deb
          path: dist/*.deb

      - name: Build Linux .rpm
        run: |
          flutter_distributor package --platform linux --targets rpm

      - name: Upload .rpm artifact
        uses: actions/upload-artifact@v5
        with:
          name: nexus-music-linux-rpm
          path: dist/*.rpm
