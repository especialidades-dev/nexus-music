name: Code quality check
on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Check the source code quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.2'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Create constant.dart
        run: |
          cat > lib/services/constant.dart << 'EOF'
          const String domain = "https://music.youtube.com/";
          const String baseUrl = '${domain}youtubei/v1/';
          const String fixedParms = '?prettyPrint=false&alt=json&key=placeholder';
          const String userAgent = 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/114.0.0.0 Safari/537.36';
          EOF

      - name: Install packages
        run: flutter pub get

      - name: Linter
        run: flutter analyze
