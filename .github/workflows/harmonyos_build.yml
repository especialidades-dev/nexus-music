name: Build Harmony OS HAP

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-harmonyos:
    name: Build Harmony OS .hap package
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Harmony OS Flutter SDK
        run: |
          git clone -b 3.22.0-ohos https://gitcode.com/openharmony-sig/flutter_flutter.git /opt/flutter-ohos
          git -C /opt/flutter-ohos checkout 2c09d22be24077bbe89b68eb6157e3c3afddda23
          git -C /opt/flutter-ohos apply "$GITHUB_WORKSPACE/.github/workflows/flutter_ohos_hvigor_plugin.patch"
          echo "/opt/flutter-ohos/bin" >> $GITHUB_PATH

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Harmony OS SDK
        run: |
          wget -q --timeout=600 \
            "https://repo.huaweicloud.com/harmonyos/ohpm/5.0.5/commandline-tools-linux-x64-5.0.5.310.zip" \
            -O /tmp/hos-tools.zip
          unzip -q /tmp/hos-tools.zip -d /opt/
          rm /tmp/hos-tools.zip
          SDK_DIR=$(ls -d /opt/command-line-tools* 2>/dev/null | head -1)
          if [ -z "$SDK_DIR" ]; then
            SDK_DIR=$(ls -d /opt/commandline-tools* /opt/hos* /opt/ohos* 2>/dev/null | head -1)
          fi
          echo "SDK_DIR=$SDK_DIR"
          if [ "$SDK_DIR" != "/opt/command-line-tools" ] && [ -n "$SDK_DIR" ]; then
            mv "$SDK_DIR" /opt/command-line-tools
          fi
          echo "DEVECO_SDK_HOME=/opt/command-line-tools/sdk" >> $GITHUB_ENV
          echo "NODE_HOME=/opt/command-line-tools/tool/node" >> $GITHUB_ENV
          echo "/opt/command-line-tools/bin" >> $GITHUB_PATH
          echo "/opt/command-line-tools/tool/node/bin" >> $GITHUB_PATH

      - name: Write local.properties (CI SDK paths)
        run: |
          cat > ohos/local.properties << 'EOF_LOCAL'
          hwsdk.dir=/opt/command-line-tools/sdk
          nodejs.dir=/opt/command-line-tools/tool/node
          flutter.sdk=/opt/flutter-ohos
          EOF_LOCAL

      - name: Configure Flutter for Harmony OS
        run: |
          flutter config --enable-ohos
          flutter pub get 2>&1 || echo "pub get crashed (expected - OHOS plugin injection bug), lock file generated"

      - name: Create constant.dart
        run: |
          cat > lib/services/constant.dart << 'EOF_CONST'
          const String domain = "https://music.youtube.com/";
          const String baseUrl = '\${domain}youtubei/v1/';
          const String fixedParms = '?prettyPrint=false&alt=json&key=${{ secrets.YTM_API_KEY }}';
          const String userAgent = 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/114.0.0.0 Safari/537.36';
          EOF_CONST

      - name: Decode AGC signing material
        env:
          NEXUS_EC_P12_B64: ${{ secrets.NEXUS_EC_P12_B64 }}
          NEXUS_PROFILE_B64: ${{ secrets.NEXUS_PROFILE_B64 }}
        run: |
          mkdir -p ohos/signing
          echo "$NEXUS_EC_P12_B64" | base64 -d > ohos/signing/nexus-ec.p12
          echo "$NEXUS_PROFILE_B64" | base64 -d > "ohos/signing/Nexus Music Debug ProfileDebug.p7b"

      - name: Pin @ohos/flutter_ohos to patched engine HAR
        env:
          HAR: ${{ github.workspace }}/ohos/third_party/flutter_embedding_debug_patched.har
          NATIVE: ${{ github.workspace }}/ohos/third_party/arm64_v8a_debug.har
          ENGINE: /opt/flutter-ohos/bin/cache/artifacts/engine/ohos-arm64
        run: |
          python3 - <<'PY'
          import json, os
          project = os.getcwd()
          har_abs = os.path.abspath(os.environ['HAR'])
          native_abs = os.path.abspath(os.environ['NATIVE'])
          har_rel = os.path.relpath(har_abs, project)
          native_rel = os.path.relpath(native_abs, project)
          lock = {
            "meta": {"stableOrder": True},
            "lockfileVersion": 3,
            "ATTENTION": "THIS IS AN AUTOGENERATED FILE. DO NOT EDIT THIS FILE DIRECTLY.",
            "specifiers": {
              f"@ohos/flutter_ohos@{har_rel}": f"@ohos/flutter_ohos@{har_rel}",
              f"flutter_native_arm64_v8a@{native_rel}": f"flutter_native_arm64_v8a@{native_rel}",
            },
            "packages": {
              f"@ohos/flutter_ohos@{har_rel}": {
                "name": "@ohos/flutter_ohos",
                "version": "1.0.0-c3e1e12625",
                "resolved": har_rel,
                "registryType": "local"
              },
              f"flutter_native_arm64_v8a@{native_rel}": {
                "name": "flutter_native_arm64_v8a",
                "version": "1.0.0-c3e1e12625",
                "resolved": native_rel,
                "registryType": "local"
              },
            },
          }
          root_lock = os.path.join(project, "ohos", "oh-package-lock.json5")
          with open(root_lock, "w") as f:
            json.dump(lock, f, indent=2)
          print(f"wrote root lockfile {root_lock} with", har_rel, native_rel)
          PY
          mkdir -p "$ENGINE"
          cp "$HAR" "$ENGINE/flutter_embedding_debug.har"
          cp "$HAR" "$ENGINE/flutter_embedding_debug_patched.har"
          cp "$NATIVE" "$ENGINE/arm64_v8a_debug.har"
          rm -rf ohos/oh_modules/.ohpm/@ohos+flutter_ohos@*
          sed -i 's/  "dependencies": {[^}]*}/  "dependencies": {}/' ohos/entry/oh-package.json5

      - name: Build Harmony OS HAP (patched, unsigned)
        run: flutter build hap --debug --target-platform ohos-arm64

      - name: Verify unsigned HAP exists
        run: test -f ohos/entry/build/default/outputs/default/entry-default-unsigned.hap || (echo "Unsigned HAP missing - build failed" && exit 1)

      - name: Sign HAP (AGC)
        env:
          KEYPW: ${{ secrets.NEXUS_KEY_PASSWORD }}
        run: |
          ENGINE=/opt/flutter-ohos/bin/cache/artifacts/engine/ohos-arm64
          HAP=/opt/command-line-tools/sdk/default/openharmony/toolchains/lib/hap-sign-tool.jar
          UNSIGNED=ohos/entry/build/default/outputs/default/entry-default-unsigned.hap
          keytool -list -rfc -keystore ohos/signing/nexus-ec.p12 -storetype PKCS12 \
            -storepass "$KEYPW" -alias nexus-app-key \
            | sed -n '/BEGIN CERT/,/END CERT/p' > /tmp/agc_chain.pem
          java -jar $HAP sign-app -mode localSign -keyAlias nexus-app-key -keyPwd "$KEYPW" \
            -appCertFile /tmp/agc_chain.pem \
            -profileFile "ohos/signing/Nexus Music Debug ProfileDebug.p7b" \
            -inFile "$UNSIGNED" -signAlg SHA256withECDSA \
            -keystoreFile ohos/signing/nexus-ec.p12 -keystorePwd "$KEYPW" \
            -outFile nexus-music-harmonyos.hap -compatibleVersion 12 -signCode 1

      - name: Upload HAP artifact
        uses: actions/upload-artifact@v5
        with:
          name: nexus-music-harmonyos-hap
          path: nexus-music-harmonyos.hap
