name: Build Harmony OS HAP

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-harmonyos:
    name: Build Harmony OS .hap package
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Harmony OS Flutter SDK
        run: |
          git clone -b 3.22.0-ohos https://gitcode.com/openharmony-sig/flutter_flutter.git /opt/flutter-ohos
          echo "/opt/flutter-ohos/bin" >> $GITHUB_PATH

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Harmony OS SDK
        run: |
          # Download HarmonyOS command-line-tools from HuggingFace mirror
          # (original Huawei CDN URL contentcenter-drcn.dbankcdn.com returned 404)
          wget -q --timeout=300 \
            "https://huggingface.co/csukuangfj/harmonyos-commandline-tools/resolve/main/commandline-tools-linux-x64-5.0.3.906.zip?download=true" \
            -O /tmp/hos-tools.zip
          unzip -q /tmp/hos-tools.zip -d /opt/
          rm /tmp/hos-tools.zip
          # Find the extracted directory (name may vary by version)
          SDK_DIR=$(ls -d /opt/command-line-tools* 2>/dev/null | head -1)
          if [ -z "$SDK_DIR" ]; then
            # Try other possible names
            SDK_DIR=$(ls -d /opt/commandline-tools* /opt/hos* /opt/ohos* 2>/dev/null | head -1)
          fi
          echo "SDK_DIR=$SDK_DIR"
          # Rename to a stable path if needed
          if [ "$SDK_DIR" != "/opt/command-line-tools" ] && [ -n "$SDK_DIR" ]; then
            mv "$SDK_DIR" /opt/command-line-tools
          fi
          # Debug: show structure
          echo "=== SDK structure ==="
          find /opt/command-line-tools -maxdepth 3 -type d | head -30
          echo "=== bin contents ==="
          ls -la /opt/command-line-tools/bin/ 2>/dev/null || echo "No bin dir"
          echo "=== sdk contents ==="
          ls -la /opt/command-line-tools/sdk/ 2>/dev/null || echo "No sdk dir"
          echo "=== tool contents ==="
          ls -la /opt/command-line-tools/tool/ 2>/dev/null || echo "No tool dir"
          # Set up environment
          echo "DEVECO_SDK_HOME=/opt/command-line-tools/sdk" >> $GITHUB_ENV
          echo "NODE_HOME=/opt/command-line-tools/tool/node" >> $GITHUB_ENV
          echo "/opt/command-line-tools/bin" >> $GITHUB_PATH
          echo "/opt/command-line-tools/tool/node/bin" >> $GITHUB_PATH

      - name: Configure Flutter for Harmony OS
        run: |
          flutter config --enable-ohos
          # pub get resolves deps and generates pubspec.lock.
          # Plugin injection crashes on OHOS 3.22.0 (null cast bug in AppInfo.getAppInfo).
          # We tolerate the crash to retain the lock file, then build with --no-pub.
          flutter pub get 2>&1 || echo "pub get crashed (expected - OHOS plugin injection bug), lock file generated"

      - name: Create constant.dart
        run: |
          cat > lib/services/constant.dart << 'EOF'
          const String domain = "https://music.youtube.com/";
          const String baseUrl = '${domain}youtubei/v1/';
          const String fixedParms = '?prettyPrint=false&alt=json&key=${{ secrets.YTM_API_KEY }}';
          const String userAgent = 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/114.0.0.0 Safari/537.36';
          EOF

      - name: Build Harmony OS HAP (debug)
        run: |
          flutter build hap --debug --target-platform ohos-arm64 --no-pub

      - name: Upload HAP artifact
        uses: actions/upload-artifact@v5
        with:
          name: nexus-music-harmonyos-hap
          path: ohos/entry/build/default/outputs/default/*.hap
